<!DOCTYPE html>
<html lang="en">
<head>
<title>Wallpapers Archive — @axrnovi</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡️</text></svg>">
<link rel="stylesheet" href="archive.css">
</head>
<body>

<header class="sticky-header visible">
    <span class="header-title">@axrnovi</span>
    <div class="header-links">
        <a href="index.html" class="header-btn">Home</a>
        <a href="https://www.threads.net/@axrnovi" target="_blank" rel="noopener noreferrer" class="header-btn">Threads</a>
    </div>
</header>

<div class="aurora-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div class="archive-wrapper">
    <div class="glass-card filter-container">
        <button class="filter-btn active" onclick="filterBrand('all')">All</button>
        <button class="filter-btn" onclick="filterBrand('authors')">My Work</button>
        <button class="filter-btn" onclick="filterBrand('apple')">Apple</button>
        <button class="filter-btn" onclick="filterBrand('google')">Pixel</button>
        <button class="filter-btn" onclick="filterBrand('samsung')">Samsung</button>
    </div>

    <div class="wallpaper-grid" id="wallpaperGrid"></div>
</div>

<div class="modal-overlay" id="wallpaperModal" onclick="closeModal(event)">
    <div class="glass-card modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal(event)">✕</button>
        <h2 class="modal-title" id="modalTitle">Collection</h2>
        <a href="#" id="modalZipBtn" target="_blank" rel="noopener noreferrer" class="glass-btn zip-download-btn">Download full pack (.zip)</a>
        
        <div class="modal-grid" id="modalGrid"></div>
    </div>
</div>

<script>
let wallpaperData = []; 
let currentFilter = 'all';

// Загрузка данных из внешнего JSON-файла
async function loadWallpaperData() {
    try {
        const response = await fetch('wallpapers.json');
        wallpaperData = await response.json();
        renderGrid(); 
    } catch (error) {
        console.error("Error loading wallpaper database:", error);
    }
}

// Рендеринг карточек на витрину
function renderGrid() {
    const grid = document.getElementById('wallpaperGrid');
    grid.innerHTML = '';
    
    // Автоматический реверс новинок наверх
    const displayData = [...wallpaperData].reverse();

    displayData.forEach((item) => {
        if (currentFilter !== 'all' && item.brand !== currentFilter) return;

        const card = document.createElement('div');
        card.className = `glass-card wallpaper-card ${item.isPremium ? 'premium-card' : ''}`;
        
        // Генерируем медиа-блок со слайдером внутри отдельного контейнера
        let mediaHtml = '<div class="card-media-wrapper">';
        if (item.previews.length > 1) {
            mediaHtml += `<div class="card-slider">`;
            item.previews.forEach((img, i) => {
                mediaHtml += `<img src="${img}" class="${i === 0 ? 'active' : ''}" alt="Preview">`;
            });
            mediaHtml += `</div>`;
        } else {
            mediaHtml += `<div class="card-slider"><img src="${item.previews[0]}" class="active" alt="Preview"></div>`;
        }
        
        const badge = item.isPremium ? `<span class="badge premium-badge">Original</span>` : `<span class="badge">Stock</span>`;
        mediaHtml += `${badge}</div>`; 

        // Нижняя текстовая часть карточки
        const infoHtml = `
            <div class="card-info">
                <h3 class="card-title">${item.title}</h3>
            </div>
        `;

        card.innerHTML = mediaHtml + infoHtml;

        // Наша строгая логика разделения Сток / Твои работы
        card.onclick = () => {
            // 1. Если это твоя платная работа на Ko-Fi
            if (item.isPremium && item.koFiUrl) {
                window.open(item.koFiUrl, '_blank');
                return;
            }

            // 2. Логика для СТОКОВЫХ обоев (Apple, Google, Samsung) — ВСЕГДА открываем коллекцию
            if (item.brand !== 'authors') {
                openModal(item);
                return;
            }

            // 3. Логика для ТВОИХ ЛИЧНЫХ работ (brand: 'authors') — гибкий выбор (одиночная или пак)
            if (!item.allImages || item.allImages.length <= 1) {
                const downloadUrl = (item.allImages && item.allImages.length > 0) ? item.allImages[0] : item.previews[0];
                window.open(downloadUrl, '_blank');
            } else {
                openModal(item);
            }
        };

        grid.appendChild(card);
    });

    initSliders();
}

// Запуск слайдеров карточек
function initSliders() {
    const sliders = document.querySelectorAll('.card-slider');
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const slider = entry.target;
            if (entry.isIntersecting) {
                if (!slider.dataset.intervalId) {
                    const images = slider.querySelectorAll('img');
                    if (images.length <= 1) return;
                    let idx = 0;
                    const intervalId = setInterval(() => {
                        images[idx].classList.remove('active');
                        idx = (idx + 1) % images.length;
                        images[idx].classList.add('active');
                    }, 3000);
                    slider.dataset.intervalId = intervalId;
                }
            } else {
                if (slider.dataset.intervalId) {
                    clearInterval(parseInt(slider.dataset.intervalId));
                    slider.removeAttribute('data-dataset-interval-id');
                    slider.dataset.intervalId = '';
                }
            }
        });
    }, { threshold: 0.1 });

    sliders.forEach(s => observer.observe(s));
}

function filterBrand(brand) {
    currentFilter = brand;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderGrid();
}

function openModal(item) {
    const modal = document.getElementById('wallpaperModal');
    document.getElementById('modalTitle').innerText = item.title;
    
    const zipBtn = document.getElementById('modalZipBtn');
    zipBtn.href = item.zipUrl;

    const modalGrid = document.getElementById('modalGrid');
    modalGrid.innerHTML = '';

    item.allImages.forEach(imgUrl => {
        const itemWrapper = document.createElement('div');
        itemWrapper.className = 'modal-item-wrapper';
        itemWrapper.innerHTML = `
            <img src="${imgUrl}" alt="Wallpaper">
            <a href="${imgUrl}" download target="_blank" class="download-single-btn">Download</a>
        `;
        modalGrid.appendChild(itemWrapper);
    });

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal(e) {
    const modal = document.getElementById('wallpaperModal');
    modal.classList.remove('active');
    document.body.style.overflow = '';
}

document.addEventListener("DOMContentLoaded", loadWallpaperData);
</script>
</body>
</html>
